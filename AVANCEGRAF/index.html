<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>SLIME OUT</title>
  <link rel="icon" type="image/x-icon" href="./images/favicon.ico">
  <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
  <script type="importmap">
    {
    "imports": {
        "three": "https://unpkg.com/three@v0.183.2/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.183.2/examples/jsm/"
    }
     }
</script>
</head>

<body>
  <div id="menu" class="screen active">
    <h1 class="title">SLIME OUT</h1>
    <div class="card">
      <button onclick="showScreen('game')">Jugar</button>
      <button onclick="showScreen('config')">Configuración</button>
      <button onclick="showScreen('score')">Puntuación</button>
    </div>
  </div>

  <div id="config" class="screen">
    <h1 class="title">Configuración</h1>
    <div class="card">
      <label>Volumen
        <input type="range">
      </label>
      <button onclick="showScreen('menu')">Volver</button>
    </div>
  </div>

  <div id="score" class="screen">
    <h1 class="title">Puntuación</h1>
    <div class="card">
      <p>Máximo: 0000</p>
      <button onclick="showScreen('menu')">Volver</button>
    </div>
  </div>

  <div id="game" class="screen">
    <h1 class="title small">Slime Out</h1>
    <canvas id="canvas" width="800" height="450"></canvas>
    <button class="pauseBtn" onclick="pauseGame()">Pausa</button>
  </div>

  <div id="pause" class="screen">
    <h1 class="slimeTitle">PAUSA</h1>
    <div class="card">
      <button onclick="resumeGame()">Continuar</button>
      <button onclick="showScreen('menu')">Salir</button>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    window.fbAsyncInit = function () {
      FB.init({
        appId: '463450690038999',
        cookie: true,
        xfbml: true,
        version: 'v22.0'
      });
      FB.AppEvents.logPageView();

    };

    (function (d, s, id) {
      var js, fjs = d.getElementsByTagName(s)[0];
      if (d.getElementById(id)) { return; }
      js = d.createElement(s); js.id = id;
      js.src = "https://connect.facebook.net/en_US/sdk.js";
      fjs.parentNode.insertBefore(js, fjs);
    }(document, 'script', 'facebook-jssdk'));


    function checkLoginState() {
      FB.api('/me', { fields: 'name' }, function (response) {
        alert(JSON.stringify(response));
        var nombre = sessionStorage.getItem("nombre");
        sessionStorage.setItem("nombre", response.name);
        localStorage.setItem("id", response.id);
        statusChangeCallback(response);
      });
    }
  </script>
  <script type="module">

    import * as THREE from 'three';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);

    const renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const geometryCube = new THREE.BoxGeometry(1, 1, 1);
    const materialCube = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
    const cube = new THREE.Mesh(geometryCube, materialCube);
    scene.add(cube)

    const geometryCylinder = new THREE.CylinderGeometry(5, 5, 20, 32);
    const materialCylinder = new THREE.MeshBasicMaterial({ color: 0x004c00 });
    const cylinder = new THREE.Mesh(geometryCylinder, materialCylinder);
    cylinder.position.set(-3, 2, 0);
    scene.add(cylinder);

    const geometryTorus = new THREE.TorusGeometry(10, 3, 16, 100);
    const materialTorus = new THREE.MeshBasicMaterial({ color: 0x006600 });
    const torus = new THREE.Mesh(geometryTorus, materialTorus);
    torus.position.set(3, 2, 0);
    scene.add(torus);

    const geometryCapsule = new THREE.CapsuleGeometry(1, 1, 4, 8, 1);
    const materialCapsule = new THREE.MeshBasicMaterial({ color: 0x009900 });
    const capsule = new THREE.Mesh(geometryCapsule, materialCapsule);
    capsule.position.set(0, 2, 0);
    scene.add(capsule);

    camera.position.z = 8;
    //camera.position.x = -2;
    camera.position.y = 2.5;
    renderer.setAnimationLoop(animate);
    function animate() {

      renderer.render(scene, camera);

    }
  </script>
</body>

</html>
